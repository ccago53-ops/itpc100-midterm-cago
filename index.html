<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Company Profile Card</title>

    <!-- External CSS -->
    <link rel="stylesheet" href="styles.css">

    <!-- Internal CSS -->
    <style>
        article {
            background-color: white;
            border-radius: 15px;
            padding: 25px;
            width: 300px;
            text-align: center;
            box-shadow: 0 6px 12px rgba(0,0,0,0.2);
        }

        article h2 {
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

<header>
    <h1>Charmela Tech Solutions</h1>
    <p>Innovating Your Digital Future</p>
</header>

<main>
    <article>
        <h2>About Us</h2>
        <p>
            Charmela Tech Solutions is a modern startup focused on building responsive and user-friendly
            web applications. We aim to help businesses grow through innovative digital solutions.
        </p>
    </article>
</main>

<footer>
    <p>© 2026 Charmela Tech Solutions</p>

    <!-- Inline CSS -->
    <button style="background-color: #007BFF; color: white; padding: 12px 20px; border: none; border-radius: 8px;">
        Contact Us
    </button>
</footer>

</body>
</html>
